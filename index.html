<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Answer Finder</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { color: #58a6ff; text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #2ea043; }
        .result-item {
            background: #21262d;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid #58a6ff;
        }
        .question { font-weight: bold; color: #ffa657; margin-bottom: 5px; }
        .answer { color: #7ee787; }
        .error { color: #f85149; text-align: center; font-weight: bold; }
        .loader { text-align: center; display: none; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kahoot Javoblarini Topuvchi</h2>
        <p style="text-align: center; font-size: 0.9em; color: #8b949e;">
            Quiz UUID kiriting (masalan: 123e4567-e89b-12d3-a456-426614174000)
        </p>
        
        <div class="input-group">
            <input type="text" id="quizId" placeholder="Kahoot Quiz ID (UUID)...">
            <button onclick="fetchAnswers()">Javoblarni olish</button>
        </div>

        <div id="loader" class="loader">Qidirilmoqda... iltimos kuting...</div>
        <div id="results"></div>
    </div>

    <script>
        async function fetchAnswers() {
            const quizId = document.getElementById('quizId').value.trim();
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            if (!quizId) {
                alert("Iltimos, ID kiriting!");
                return;
            }

            // Tozalash
            resultsDiv.innerHTML = "";
            loader.style.display = "block";

            // AllOrigins Proxy ishlatish (CORS xatoligini oldini olish uchun)
            const targetUrl = `https://play.kahoot.it/rest/kahoots/${quizId}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Proxy server bilan bog'lanib bo'lmadi.");

                const result = await response.json();
                
                // AllOrigins 'contents' ichida ma'lumotni qaytaradi
                if (!result.contents) {
                    throw new Error("Ma'lumot topilmadi.");
                }

                const data = JSON.parse(result.contents);
                loader.style.display = "none";

                if (!data.questions || data.questions.length === 0) {
                    resultsDiv.innerHTML = "<p class='error'>Savollar topilmadi. Quiz 'Private' bo'lishi mumkin.</p>";
                    return;
                }

                data.questions.forEach((q, index) => {
                    // Faqat savollarni olish (slaydlarni o'tkazib yuborish)
                    if (q.type === "content") return;

                    const questionText = q.question ? cleanHtml(q.question) : "Savol matni mavjud emas";
                    
                    // To'g'ri javoblarni yig'ish (Quiz, True/False va Multiple Choice uchun)
                    const correctChoices = q.choices
                        ? q.choices
                            .filter(c => c.correct)
                            .map(c => cleanHtml(c.answer))
                            .join(" | ")
                        : "";

                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <div class="question">${index + 1}. ${questionText}</div>
                        <div class="answer">✅ Javob: ${correctChoices || "Javob topilmadi (balki u ochiq savoldir)"}</div>
                    `;
                    resultsDiv.appendChild(item);
                });

            } catch (err) {
                loader.style.display = "none";
                resultsDiv.innerHTML = `<p class="error">Xatolik: Quiz ID noto'g'ri yoki u yopiq (Private).</p>`;
                console.error("Detail error:", err);
            }
        }

        // HTML teglarini tozalash funksiyasi
        function cleanHtml(text) {
            if (!text) return "";
            return text
                .replace(/<\/?[^>]+(>|$)/g, "") // HTML teglarini o'chirish
                .replace(/&nbsp;/g, " ")
                .replace(/&quot;/g, '"')
                .replace(/&amp;/g, '&')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>');
        }
    </script>
</body>
</html>
